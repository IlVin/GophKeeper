syntax = "proto3";

package gophkeeper.v1;

option go_package = "gophkeeper/api/proto/gophkeeper/v1;v1";

service DeviceAttachment {
  // Step 1: begin attachment of a new local SQLite container over authenticated TLS 1.3.
  // Server resolves the account by SSH public key, creates a one-time challenge session
  // for operation "attach-device", and returns only public challenge parameters.
  rpc AttachDeviceBegin(AttachDeviceBeginRequest) returns (AttachDeviceBeginResponse);

  // Step 2: client proves possession of the registered SSH key using
  // AuthChallengeSignature over ChallengePayload(attach-device).
  // Only after successful verification does the server return AccountSalt
  // and AccountBootstrapEnvelope.
  rpc AttachDeviceAuth(AttachDeviceAuthRequest) returns (AttachDeviceAuthResponse);

  // Step 3: client derives AccountUnlockKey locally, decrypts AccountBootstrapEnvelope,
  // generates a new DeviceID and per-container mTLS identity, then submits
  // DeviceMasterKeyEnvelope and CSR to complete attachment.
  rpc AttachDeviceFinish(AttachDeviceFinishRequest) returns (AttachDeviceFinishResponse);
}

message AttachDeviceBeginRequest {
  // SSH public key in canonical OpenSSH public key wire format ("public key blob"),
  // exactly as used for SSH signature verification and fingerprint calculation.
  // This is binary key material, not authorized_keys text.
  bytes ssh_public_key = 1;
}

message AttachDeviceBeginResponse {
  // Canonical UUID string of the account identified by ssh_public_key.
  string user_id = 1;

  // Canonical UUID string identifying one-time challenge session.
  string session_id = 2;

  // One-time random server nonce bound to this challenge session.
  bytes server_nonce = 3;
}

message AttachDeviceAuthRequest {
  // Canonical UUID string.
  string user_id = 1;

  // Canonical UUID string of the challenge session returned by AttachDeviceBegin.
  string session_id = 2;

  // SSH signature blob over serialized ChallengePayload with:
  // - version = 1
  // - context = "gophkeeper-auth-challenge-v1"
  // - user_id
  // - session_id
  // - server_nonce
  // - operation = "attach-device"
  //
  // This field carries the SSH-agent-produced authentication signature
  // for server-side verification. It must not be used as KDF input.
  bytes auth_challenge_signature = 3;
}

message AttachDeviceAuthResponse {
  // 32-byte random account salt associated with the account.
  // Must be returned only after successful challenge authentication.
  bytes account_salt = 1;

  // Versioned envelope containing AccountMasterKey encrypted under AccountUnlockKey.
  // Must be returned only after successful challenge authentication.
  bytes account_bootstrap_envelope = 2;
}

message AttachDeviceFinishRequest {
  // Canonical UUID string.
  string user_id = 1;

  // Canonical UUID string of the authenticated challenge session.
  string session_id = 2;

  // Canonical UUID string of the new local SQLite container.
  string device_id = 3;

  // Versioned envelope containing AccountMasterKey encrypted under DeviceKEK.
  bytes device_master_key_envelope = 4;

  // PKCS#10 certificate signing request for per-container mTLS client certificate.
  bytes csr = 5;
}

message AttachDeviceFinishResponse {
  // Issued client mTLS certificate for this DeviceID / container.
  bytes client_certificate = 1;

  // Optional certificate chain required to validate the issued client certificate.
  bytes ca_chain = 2;
}