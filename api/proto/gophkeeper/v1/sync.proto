syntax = "proto3";

// Пакет gophkeeper.v1 определяет сетевой контракт первой версии gRPC-сервисов
// авторизации, регистрации и обмена данными крипто-сейфа GophKeeper.
package gophkeeper.v1;

import "google/protobuf/timestamp.proto";

// Каноническая опция генерации Go-кода, соответствующая структуре папки gen/go/
option go_package = "gophkeeper/gen/go/gophkeeper/v1;gophkeeperv1";

// Сервис SyncService управляет дифференциальной репликацией крипто-конвертов
// между локальной СУБД SQLite и облачным хранилищем по стратегии Last-Write-Wins (LWW).
service SyncService {
  // Дифференциальная проверка: клиент отправляет карту версий своих локальных записей,
  // сервер сравнивает метки времени и возвращает списки UUID для фаз Pull и Push.
  rpc SyncCheck(SyncCheckRequest) returns (SyncCheckResponse);

  // Скачивание свежих или отсутствующих зашифрованных конвертов с сервера (Фаза PULL).
  rpc PullRecords(PullRecordsRequest) returns (PullRecordsResponse);

  // Загрузка новых локальных оффлайн-изменений в облако (Фаза PUSH).
  rpc PushRecords(PushRecordsRequest) returns (PushRecordsResponse);
}

message RecordVersion {
  // Уникальный UUID v5 зашифрованной записи.
  string record_id = 1; 
  
  // Строгая временная метка модификации для детерминированного LWW-сравнения.
  google.protobuf.Timestamp updated_at = 2;

  // Флаг мягкого удаления записи (0 - запись активна, 1 - запись удалена локально).
  int32 is_deleted = 3;
}

message SyncCheckRequest {
  // Плоский список версий записей, хранящихся на клиенте (включая маркеры удалений).
  repeated RecordVersion local_versions = 1;
}

message SyncCheckResponse {
  // Список UUID записей, которые на сервере новее, чем на клиенте (нужно скачать).
  repeated string ids_to_pull = 1;
  
  // Список UUID записей, которые локально новее, чем в облаке (нужно закачать).
  repeated string ids_to_push = 2;
}

message EncryptedRecordPayload {
  string record_id = 1;
  
  // Открытое имя записи для быстрого поиска и листинга.
  string name = 2;       
  
  // Категория секрета (credentials, text, binary, card).
  string type = 3;       
  
  // Бинарные JSON-байты крипто-конверта crypto.Envelope (шифртекст + nonce + tag).
  // Может отправляться пустым (nil) при фиксации удаления на фазе Push.
  bytes envelope = 4;    
  
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;

  // Унифицированный числовой статус удаления для выравнивания с СУБД SQLite и PostgreSQL.
  int32 is_deleted = 7;
}

message PullRecordsRequest {
  repeated string record_ids = 1;
}

message PullRecordsResponse {
  // Набор запрошенных зашифрованных конвертов с метаданными и статусами удаления.
  repeated EncryptedRecordPayload records = 1;
}

message PushRecordsRequest {
  // Набор локальных зашифрованных конвертов для публикации или удаления в облаке.
  repeated EncryptedRecordPayload records = 1;
}

message PushRecordsResponse {
  // Флаг успешного применения пакета и фиксации транзакции в облачной БД.
  bool success = 1;
}
