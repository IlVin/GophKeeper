syntax = "proto3";

package gophkeeper.v1;

option go_package = "gophkeeper/api/proto/gophkeeper/v1;v1";

service Registration {
  // Шаг 1: Начало регистрации/присоединения через TLS 1.3 с проверкой подлинности сервера.
  // Сервер проверяет наличие SshFingerprint. Возвращает UserID (существующий или зарезервированный),
  // SessionID и ServerNonce для одноразового челленджа.
  rpc RegisterBegin(RegisterBeginRequest) returns (RegisterBeginResponse);

  // Шаг 2: Клиент доказывает владение ключом, отправляя AuthChallengeSignature,
  // и передает свою локальную соль и конверты. Сервер сверяет подпись, фиксирует каноничное
  // состояние аккаунта и выпускает mTLS сертификат контейнера.
  rpc RegisterFinish(RegisterFinishRequest) returns (RegisterFinishResponse);
}

message RegisterBeginRequest {
  // Публичный ключ в каноническом формате OpenSSH Wire BLOB (из ssh-agent).
  // Используется сервером для вычисления SshFingerprint и валидации челленджа.
  bytes ssh_public_key = 1;
}

message RegisterBeginResponse {
  // UUID пользователя (новый зарезервированный или уже существующий в БД сервера).
  string user_id = 1;

  // UUID одноразовой сессии челленджа (TTL 5 минут, статус Unused).
  string session_id = 2;

  // Случайный криптографический нонс сервера для защиты от атак повторения (Replay).
  bytes server_nonce = 3;
}

message RegisterFinishRequest {
  string user_id = 1;
  string session_id = 2;

  // Подпись Ed25519 из ssh-agent над ChallengePayload(register).
  // Формат Payload строго Big-Endian: version + context + user_id + session_id + server_nonce + operation.
  bytes auth_challenge_signature = 3;

  // UUID локального SQLite контейнера, генерируемый при init.
  string device_id = 4;

  // ИСПРАВЛЕНО: Клиент передает свою локальную соль, сгенерированную автономно.
  bytes account_salt = 5;

  // Конверт мастер-ключа под ключом разблокировки (Cloud Bootstrap Envelope).
  bytes account_bootstrap_envelope = 6;

  // Конверт мастер-ключа под ключом устройства (Opaque для сервера).
  bytes device_master_key_envelope = 7;

  // Запрос на выпуск mTLS сертификата устройства (PKCS#10 CSR).
  bytes csr = 8;

  // Публичный ключ в каноническом формате OpenSSH Wire BLOB (из ssh-agent).
  bytes ssh_public_key = 9;
}

message RegisterFinishResponse {
  // Статус регистрации: account_created (первый контейнер) или account_joined (последующий)
  string status = 1;

  // ИСПРАВЛЕНО: Обязательный возврат канонического состояния для сверки и запуска Reconcile
  bytes canonical_account_salt = 2;
  bytes canonical_account_bootstrap_envelope = 3;

  // Выпущенный mTLS сертификат для авторизации данного DeviceID на gRPC Sync-портах.
  bytes client_certificate = 4;
  bytes ca_chain = 5;
}
