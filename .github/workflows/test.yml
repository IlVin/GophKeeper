name: test

on:
  push:
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests
        run: go test ./... -short -count=1

  functional-sshagent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Verify OpenSSH tools
        run: |
          which ssh-agent
          which ssh-add
          which ssh-keygen

      - name: Download dependencies
        run: go mod download

      - name: Run functional ssh-agent tests
        run: go test -tags=functional ./internal/adapters/sshagent -count=1 -v