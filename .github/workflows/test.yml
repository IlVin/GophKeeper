name: test

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  
  tests-e2e:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: '1.26'

    - name: Start Native Ubuntu PostgreSQL Service
      run: |
        # Запускаем системную службу postgresql, предустановленную в Ubuntu Runner
        sudo systemctl start postgresql.service
        
        # Меняем пароль дефолтного пользователя postgres на наш тестовый канон
        sudo -u postgres psql -c "ALTER USER postgres PASSWORD 'gophkeeper_pswd';"
        
        # Создаем целевую пустую базу данных для миграций gRPC сервера
        sudo -u postgres psql -c "CREATE DATABASE gophkeeper;"
        
        # Создаем пользователя gophkeeper с нужными правами
        sudo -u postgres psql -c "CREATE USER gophkeeper WITH PASSWORD 'gophkeeper_pswd';"
        sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE gophkeeper TO gophkeeper;"
        sudo -u postgres psql -c "ALTER DATABASE gophkeeper OWNER TO gophkeeper;"

    - name: Run Database Migrations on Test DB
      run: |
         go run github.com/pressly/goose/v3/cmd/goose@latest \
          -dir=${{ github.workspace }}/internal/server/providers/postgres/migrations \
          postgres "user=gophkeeper password=gophkeeper_pswd dbname=gophkeeper host=127.0.0.1 sslmode=disable" up

    - name: Start Ephemeral SSH Agent and Generate Test Key
      run: |
        # Запускаем локальный демон ssh-agent и экспортируем его переменные в окружение шага
        eval "$(ssh-agent -s)"
        
        # Записываем переменные агента в глобальный файл окружения GitHub Actions,
        # чтобы ВСЕ последующие шаги воркфлоу (включая go test) видели этот сокет!
        echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> $GITHUB_ENV
        echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> $GITHUB_ENV
        
        # Генерируем абсолютно чистый, беспарольный (-N "") ключ Ed25519 внутри Runner
        mkdir -p ~/.ssh
        ssh-keygen -t ed25519 -N "" -f ~/.ssh/id_ed25519 -C "gophkeeper-ci-test"
        
        # Добавляем сгенерированный ключ в память поднятого агента
        ssh-add ~/.ssh/id_ed25519
        
        # Дебаг-проверка для логов CI/CD: выводим список активных фингерпринтов в агенте
        ssh-add -l

    # 3. УСТАНОВКА COMPILER PROTOBUF (protoc) И ПЛАГИНОВ КОДОГЕНЕРАЦИИ
    - name: Install Protocol Buffers Compiler
      uses: arduino/setup-protoc@v3
      with:
        version: '25.x' # Версия компилятора, совместимая с современным Go-рантаймом

    - name: Install Go Protobuf Plugins
      run: |
        # Устанавливаем официальные Go-плагины для генерации структур и gRPC-кода
        go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
        go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
        
        # Добавляем путь к установленным плагинам ($GOPATH/bin) в системный PATH раннера,
        # чтобы утилита protoc видела их во время вызова make build!
        echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

    # ГЕНЕРИРУЕМ СИСТЕМНЫЕ СЕРТИФИКАТЫ PKI (Критический шаг для mTLS)
    - name: Generate Ephemeral PKI Certificates
      run: make certs # Вызывает ваш таргет, создавая .certs_private/ на диске Runner!

    # Компилируем ОБА бинарника (и клиента, и сервер), так как тест будет дергать их оба!
    - name: Compile Client and Server Binaries
      run: make build-linux

    # ЗАПУСКАЕМ СЕТЕВЫЕ И ЛОКАЛЬНЫЕ E2E ТЕСТЫ ОДНОЙ КОМАНДОЙ
    - name: Run All Dedicated E2E Network Tests
      env:
        # Передаем серверу строку подключения к поднятому GitHub сервису Postgres
        DATABASE_DSN: "postgres://gophkeeper:gophkeeper_pswd@localhost:5432/gophkeeper?sslmode=disable"
      run: |
        go test -tags=e2e ./internal/client/commands... -run E2E -count=1 -v

  unit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests
        run: go test ./... -short -count=1

  functional-sshagent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Verify OpenSSH tools
        run: |
          which ssh-agent
          which ssh-add
          which ssh-keygen

      - name: Download dependencies
        run: go mod download

      - name: Run functional ssh-agent tests
        run: go test -tags=functional ./internal/client/providers/sshagent -count=1 -v
